name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rms
          POSTGRES_PASSWORD: rms_password
          POSTGRES_DB: rms_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U rms" --health-interval 10s
          --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    env:
      DATABASE_URL: postgresql://rms:rms_password@localhost:5432/rms_test
      DIRECT_URL: postgresql://rms:rms_password@localhost:5432/rms_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      AES_256_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      JWT_ACCESS_SECRET: ci_access
      JWT_REFRESH_SECRET: ci_refresh
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @app/api prisma:generate
      - run: pnpm --filter @app/api prisma:deploy
      - run: pnpm --filter @app/api test
      - run: pnpm --filter @app/api build

  docker-publish:
    needs: test-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          target: production
          push: true
          tags: ghcr.io/${{ github.repository }}/api:latest
      # Deploy step (example): SSH into server and pull the new image.
